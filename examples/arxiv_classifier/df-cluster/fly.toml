app = "strata-df-cluster"
primary_region = "sjc"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  # Keep one machine warm. With min_machines_running = 0 the first
  # request after idle pays an ~8s cold start, which is too sluggish
  # for a review session. ``auto_stop_machines = "suspend"`` snapshots
  # memory when idle so wake-up is fast.
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/health"

[[vm]]
  size = "shared-cpu-4x"
  memory = "8gb"
