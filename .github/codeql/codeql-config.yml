name: Strata CodeQL config

# Path exclusions for CodeQL's Python analyzer. Referenced from
# ``.github/workflows/codeql.yml``.

paths-ignore:
  # Example notebook directories. Prompt and SQL cells in these dirs
  # use the .py extension by project convention but aren't valid
  # Python — they contain {{ var }} template substitution syntax
  # (prompt cells) or raw SQL (SQL cells). CodeQL's Python parser
  # reports them as syntax errors, which they are when interpreted
  # as Python, but they're never executed as Python at runtime; the
  # notebook executor dispatches by cell ``language`` field.
  - 'examples/**'

  # Generated frontend assets bundled into the wheel. Not shipped
  # source code; analyzing the minified output adds nothing.
  - 'src/strata/_frontend/**'

  # Documentation source — not executable code.
  - 'docs/**'

# Default CodeQL queries are sufficient. If we want to add the
# security-extended or security-and-quality suites later, this is
# the place — see https://docs.github.com/en/code-security/code-
# scanning/creating-an-advanced-setup-for-code-scanning/customizing-
# your-advanced-setup-for-code-scanning#specifying-additional-queries
# queries:
#   - uses: security-extended
