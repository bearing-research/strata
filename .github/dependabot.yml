version: 2

# Weekly cadence on Monday mornings. Grouped updates so we get one
# PR per ecosystem per week instead of N PRs per minor bump.

updates:
  # Pin GitHub Actions to SHAs and let Dependabot bump them. This is
  # what closes the bulk of Scorecard's PinnedDependenciesID alerts —
  # combined with the SHA-pinning sweep in the workflows themselves.
  #
  # Group only minor + patch bumps; major bumps come as individual PRs
  # we review case-by-case. We learned this the hard way with the
  # PR #7 megabump that touched release.yml in ways CI couldn't
  # exercise (the wheel-publish pipeline only runs on v* tags).
  #
  # release.yml's artifact + gh-release actions are ignored entirely
  # for majors — those need manual smoke-testing against the publish
  # pipeline before we accept the bump.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/Los_Angeles
    open-pull-requests-limit: 5
    groups:
      actions:
        patterns: ["*"]
        update-types: [minor, patch]
    ignore:
      # Major bumps on release.yml-critical actions. Tests don't
      # exercise release.yml, so a green CI doesn't mean the
      # wheel-publish pipeline still works. Bump these manually
      # with a tag-driven dry-run when needed.
      - dependency-name: "actions/upload-artifact"
        update-types: [version-update:semver-major]
      - dependency-name: "actions/download-artifact"
        update-types: [version-update:semver-major]
      - dependency-name: "softprops/action-gh-release"
        update-types: [version-update:semver-major]
      - dependency-name: "github/codeql-action"
        update-types: [version-update:semver-major]
    commit-message:
      prefix: ci
      include: scope

  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/Los_Angeles
    open-pull-requests-limit: 5
    groups:
      python-runtime:
        dependency-type: production
        update-types: [minor, patch]
      python-dev:
        dependency-type: development
        update-types: [minor, patch]
    commit-message:
      prefix: deps
      include: scope

  - package-ecosystem: cargo
    directory: /rust
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/Los_Angeles
    open-pull-requests-limit: 3
    groups:
      rust:
        patterns: ["*"]
    commit-message:
      prefix: deps
      include: scope

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/Los_Angeles
    open-pull-requests-limit: 5
    groups:
      npm-runtime:
        dependency-type: production
        update-types: [minor, patch]
      npm-dev:
        dependency-type: development
        update-types: [minor, patch]
    commit-message:
      prefix: deps
      include: scope

  # Keep the digest-pinned Docker base images current. The Dockerfiles
  # pin `FROM` by tag + sha256 (Scorecard Pinned-Dependencies); without
  # this ecosystem those digests go stale and miss base-image security
  # patches. Covers the shipped image (/) and the df-cluster example.
  - package-ecosystem: docker
    directories:
      - /
      - /examples/arxiv_classifier/df-cluster
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/Los_Angeles
    open-pull-requests-limit: 3
    groups:
      docker:
        patterns: ["*"]
        update-types: [minor, patch]
    commit-message:
      prefix: ci
      include: scope
