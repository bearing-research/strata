name: Integration Tests

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'mkdocs.yml'
      - '*.md'
      - 'LICENSE'
      - '.github/workflows/docs.yml'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'mkdocs.yml'
      - '*.md'
      - 'LICENSE'
      - '.github/workflows/docs.yml'

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  STRATA_CATALOG_URI: postgresql://strata:strata@localhost:5432/iceberg_catalog

jobs:
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: strata
          POSTGRES_PASSWORD: strata
          POSTGRES_DB: iceberg_catalog
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U strata -d iceberg_catalog"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6  # v1
        with:
          toolchain: stable
          cache-workspaces: rust

      - name: Verify Rust toolchain
        shell: bash
        run: |
          rustup default stable
          rustup show active-toolchain
          cargo --version
          rustc --version

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          version: "latest"

      - name: Install dependencies and build Rust extension
        run: uv sync --all-extras

      - name: Run integration tests
        run: uv run python scripts/integration_test.py --start-server

      - name: Run emulator-backed mount integration tests
        run: |
          uv run pytest \
            tests/notebook/test_e2e_mounts_s3.py \
            tests/notebook/test_e2e_mounts_azure.py \
            tests/notebook/test_e2e_mounts_gcs.py \
            -v --tb=short -p no:cacheprovider
