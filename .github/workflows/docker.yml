name: Docker

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'mkdocs.yml'
      - '*.md'
      - 'LICENSE'
      - '.github/workflows/docs.yml'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'mkdocs.yml'
      - '*.md'
      - 'LICENSE'
      - '.github/workflows/docs.yml'

permissions:
  contents: read

jobs:
  build:
    name: Build and test Docker image
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0

      - name: Build Docker image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
        with:
          context: .
          push: false
          load: true
          tags: strata:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start container
        run: |
          docker run -d --name strata-test -p 8765:8765 strata:test

      - name: Health check
        run: |
          # Poll /health for up to 30s instead of a fixed sleep. Cold
          # container startup on GH runners has been flaky at the prior
          # 10s window. ``--retry-connrefused`` keeps curl trying while
          # the listener is still binding.
          curl -fsS --retry 30 --retry-delay 1 --retry-connrefused \
            --retry-all-errors http://localhost:8765/health
          # On failure, surface the container logs so the next failure
          # is debuggable from CI alone.
        # The "if failure" step below dumps logs.

      - name: Container logs on failure
        if: failure()
        run: docker logs strata-test || true

      - name: Check metrics endpoint
        run: |
          curl -f http://localhost:8765/metrics

      - name: Stop container
        if: always()
        run: |
          docker stop strata-test || true
          docker rm strata-test || true
