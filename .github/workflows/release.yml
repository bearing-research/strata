name: Release

# Tag-driven release pipeline. Pushing a `v*` tag fires the build,
# which:
#   1. compiles the frontend SPA and stages it inside the package,
#   2. builds platform wheels via maturin (abi3-py312 means one
#      wheel per platform covers Python 3.12+),
#   3. builds an sdist on Linux x86_64,
#   4. publishes everything to TestPyPI via OIDC trusted publishing,
#   5. waits for manual approval on the protected `pypi` environment,
#      then publishes to PyPI.
#
# OIDC trusted publishers must be configured on PyPI and TestPyPI
# (Owner: bearing-research, Repo: strata, Workflow: release.yml,
# Environment: testpypi / pypi) before the publish jobs can run.
#
# The protected `pypi` environment in GitHub repo settings should
# require manual approval; that's the human gate between TestPyPI
# validation and the real PyPI upload.

on:
  push:
    tags:
      - 'v*'
  # Manual fallback for re-publishing without re-tagging — useful
  # if a publish job hits a transient PyPI/TestPyPI hiccup. Pass the
  # already-released version (without the leading ``v``) so the
  # pre-flight checks still verify version consistency.
  workflow_dispatch:
    inputs:
      version:
        description: "Version without the leading v (e.g. 0.2.0). Required on manual runs."
        required: true
        type: string

permissions:
  contents: read

env:
  NODE_VERSION: '24'
  # GitHub plans to default JS actions to Node 24 on 2026-06-02 and
  # remove Node 20 on 2026-09-16. Opting in early silences the
  # per-step deprecation warnings and surfaces any incompatibility
  # now rather than at the cutover.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # --- pre-flight ----------------------------------------------------
  # Fails fast before any wheel build if the CHANGELOG is missing a
  # section for this version. The package version lives only in
  # ``pyproject.toml`` (``src/strata/__init__.py`` reads it via
  # ``importlib.metadata``) so there's no dual-source drift to police —
  # maturin builds whatever ``pyproject.toml`` says, regardless of the
  # tag name. The single tag/pyproject sanity check below catches the
  # cosmetic case where the tag was bumped but ``uv version`` wasn't.
  preflight:
    name: Pre-flight checks
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      is_prerelease: ${{ steps.resolve.outputs.is_prerelease }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          # Tag-driven runs default to the tag (github.ref =
          # refs/tags/vX.Y.Z), which is fine. workflow_dispatch
          # otherwise checks out the branch the user dispatched
          # from — if main has moved since the tag, the wheels
          # we'd build wouldn't correspond to the original tag.
          # Redirect dispatch runs to v${inputs.version} so
          # republish recovery actually rebuilds the tagged source.
          ref: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', inputs.version) || github.ref }}


      - name: Resolve version + run checks
        id: resolve
        env:
          DISPATCH_VERSION: ${{ inputs.version }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import os
          import re
          import sys
          import tomllib

          if os.environ["EVENT_NAME"] == "workflow_dispatch":
              version = os.environ["DISPATCH_VERSION"]
          else:
              version = os.environ["GITHUB_REF_NAME"].lstrip("v")

          with open("pyproject.toml", "rb") as f:
              pyproject_version = tomllib.load(f)["project"]["version"]
          if pyproject_version != version:
              print(
                  f"::error::Release tag/input {version!r} doesn't match "
                  f"pyproject.toml version {pyproject_version!r}. "
                  "Run ``uv version`` to align them.",
                  file=sys.stderr,
              )
              sys.exit(1)

          changelog = open("CHANGELOG.md").read()
          if not re.search(rf"^##\s+{re.escape(version)}(?:\s|$)", changelog, re.MULTILINE):
              print(
                  f"::error::CHANGELOG.md has no '## {version}' section heading.",
                  file=sys.stderr,
              )
              sys.exit(1)

          # PEP 440 stable releases are digit-and-dot only; anything else
          # (a / b / rc / dev / post) is a pre-release for GitHub Releases.
          is_prerelease = "false" if re.fullmatch(r"[0-9.]+", version) else "true"
          print(f"version={version}")
          print(f"is_prerelease={is_prerelease}")
          PY

  # --- frontend bundling ---------------------------------------------
  # Build the SPA once and stage it as an artifact. Each platform's
  # wheel job downloads it and copies it into src/strata/_frontend
  # before maturin runs. Doing it once avoids 5x npm cold installs.
  frontend:
    name: Build frontend
    runs-on: ubuntu-latest
    needs: preflight
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          # Tag-driven runs default to the tag (github.ref =
          # refs/tags/vX.Y.Z), which is fine. workflow_dispatch
          # otherwise checks out the branch the user dispatched
          # from — if main has moved since the tag, the wheels
          # we'd build wouldn't correspond to the original tag.
          # Redirect dispatch runs to v${inputs.version} so
          # republish recovery actually rebuilds the tagged source.
          ref: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', inputs.version) || github.ref }}


      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install + build
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6
        with:
          name: frontend-dist
          path: frontend/dist
          if-no-files-found: error

  # --- linux wheels (x86_64 + aarch64) -------------------------------
  linux:
    name: wheel · linux ${{ matrix.target }}
    runs-on: ubuntu-latest
    needs: frontend
    strategy:
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          # Tag-driven runs default to the tag (github.ref =
          # refs/tags/vX.Y.Z), which is fine. workflow_dispatch
          # otherwise checks out the branch the user dispatched
          # from — if main has moved since the tag, the wheels
          # we'd build wouldn't correspond to the original tag.
          # Redirect dispatch runs to v${inputs.version} so
          # republish recovery actually rebuilds the tagged source.
          ref: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', inputs.version) || github.ref }}


      - uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53  # v6
        with:
          name: frontend-dist
          path: src/strata/_frontend

      - uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b  # v1
        with:
          target: ${{ matrix.target }}
          # Linux x86_64 also produces the sdist (one source tarball
          # is enough; the contents are identical regardless of host).
          # `manylinux: auto` picks the most permissive manylinux tag
          # the toolchain can satisfy.
          args: >-
            --release --out dist
            ${{ matrix.target == 'x86_64' && '--sdist' || '' }}
          sccache: 'true'
          manylinux: auto

      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6
        with:
          name: dist-linux-${{ matrix.target }}
          path: dist
          if-no-files-found: error

  # --- macos wheels (intel + apple silicon) --------------------------
  macos:
    name: wheel · macos ${{ matrix.target }}
    runs-on: macos-latest
    needs: frontend
    strategy:
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          # Tag-driven runs default to the tag (github.ref =
          # refs/tags/vX.Y.Z), which is fine. workflow_dispatch
          # otherwise checks out the branch the user dispatched
          # from — if main has moved since the tag, the wheels
          # we'd build wouldn't correspond to the original tag.
          # Redirect dispatch runs to v${inputs.version} so
          # republish recovery actually rebuilds the tagged source.
          ref: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', inputs.version) || github.ref }}


      - uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53  # v6
        with:
          name: frontend-dist
          path: src/strata/_frontend

      - uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b  # v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist
          sccache: 'true'

      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6
        with:
          name: dist-macos-${{ matrix.target }}
          path: dist
          if-no-files-found: error

  # --- windows wheels ------------------------------------------------
  windows:
    name: wheel · windows ${{ matrix.target }}
    runs-on: windows-latest
    needs: frontend
    strategy:
      matrix:
        target: [x64]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          # Tag-driven runs default to the tag (github.ref =
          # refs/tags/vX.Y.Z), which is fine. workflow_dispatch
          # otherwise checks out the branch the user dispatched
          # from — if main has moved since the tag, the wheels
          # we'd build wouldn't correspond to the original tag.
          # Redirect dispatch runs to v${inputs.version} so
          # republish recovery actually rebuilds the tagged source.
          ref: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', inputs.version) || github.ref }}


      - uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53  # v6
        with:
          name: frontend-dist
          path: src/strata/_frontend

      - uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b  # v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist
          sccache: 'true'

      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6
        with:
          name: dist-windows-${{ matrix.target }}
          path: dist
          if-no-files-found: error

  # --- wheel smoke test ----------------------------------------------
  # Install the just-built Linux x86_64 wheel in a fresh uv-managed
  # venv, exercise the import surface, all three console scripts, and
  # the server's /health endpoint. Catches release-pipeline bugs
  # locally before the publish step: missing dependencies, broken
  # entry points, native extension that doesn't load, frontend bundle
  # missing from the wheel. Discovered via 0.1.0a0/a1 alphas (missing
  # ``packaging`` dep, missing LICENSE in sdist) — adding here so the
  # next class of bug fails the CI run rather than poisoning a PyPI
  # version slot.
  #
  # Only the Linux x86_64 wheel is exercised because the other
  # platforms' wheels (linux aarch64, macos x86_64) are cross-built
  # and not natively runnable on the host. Same Python sources, so a
  # dep or entry-point bug surfaces here regardless.
  wheel-test:
    name: Smoke-test linux x86_64 wheel · python ${{ matrix.python }}
    runs-on: ubuntu-latest
    needs: [linux, macos, windows]
    strategy:
      # abi3-py312 means one wheel installs on every Python 3.12+.
      # The matrix validates that forward-compat claim against the
      # actual interpreters CI knows about, not just the one
      # setup-uv defaults to.
      fail-fast: false
      matrix:
        python: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53  # v6
        with:
          name: dist-linux-x86_64
          path: dist

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0

      - name: Smoke-test the wheel
        env:
          STRATA_PORT: '8767'
          STRATA_NOTEBOOK_STORAGE_DIR: /tmp/strata-smoke-nb
        run: |
          set -euo pipefail

          WHEEL=$(ls dist/strata_notebook-*-cp312-abi3-manylinux*x86_64*.whl | head -1)
          echo "::notice::Testing wheel ${WHEEL}"

          # Strata's runtime guard requires a uv-managed venv. ``uv
          # venv`` produces one with the ``uv = <version>`` pyvenv.cfg
          # marker the guard checks for. ``--python`` pins the matrix
          # interpreter (uv fetches it if not already installed).
          uv venv --python ${{ matrix.python }} /tmp/strata-smoke
          VIRTUAL_ENV=/tmp/strata-smoke uv pip install \
            --index https://pypi.org/simple/ \
            "${WHEEL}"

          echo "--- import smoke ---"
          /tmp/strata-smoke/bin/python -c "
          import strata
          from strata import StrataClient, AsyncStrataClient
          print('strata module + clients import ok')
          "

          echo "--- console scripts ---"
          /tmp/strata-smoke/bin/strata --help >/dev/null
          /tmp/strata-smoke/bin/strata-worker --help >/dev/null
          echo "strata and strata-worker --help ok"

          echo "--- server boot + /health ---"
          /tmp/strata-smoke/bin/strata-notebook >/tmp/server.log 2>&1 &
          SERVER_PID=$!
          # Poll /health for up to 30s. The server's eager warmup runs
          # in the lifespan handler, so the first request can arrive
          # before binding finishes on a cold runner.
          for i in $(seq 1 30); do
            if curl -fsS "http://127.0.0.1:${STRATA_PORT}/health" >/dev/null 2>&1; then
              echo "::notice::server responded to /health after ${i}s"
              break
            fi
            sleep 1
          done
          # Fetch /health one more time so the final response (or
          # error) is in the log.
          curl -fsS "http://127.0.0.1:${STRATA_PORT}/health" || {
            echo "::error::server did not respond to /health within 30s"
            echo "--- server log ---"
            cat /tmp/server.log
            kill "${SERVER_PID}" 2>/dev/null || true
            exit 1
          }
          echo

          echo "--- GET / (frontend bundle present?) ---"
          # _mount_frontend() in server.py silently skips mounting the
          # SPA when src/strata/_frontend/index.html is absent, so a
          # broken wheel without the bundle would still pass /health.
          # Verify the SPA index actually serves and looks like HTML.
          curl -fsS "http://127.0.0.1:${STRATA_PORT}/" -o /tmp/frontend.html
          if ! grep -qi '<!doctype html' /tmp/frontend.html; then
            echo "::error::GET / did not return the SPA index.html — frontend bundle missing from wheel"
            echo "--- response body (first 200 bytes) ---"
            head -c 200 /tmp/frontend.html
            kill "${SERVER_PID}" 2>/dev/null || true
            exit 1
          fi
          echo "::notice::frontend bundle served ($(wc -c < /tmp/frontend.html) bytes)"

          kill "${SERVER_PID}" 2>/dev/null || true
          wait "${SERVER_PID}" 2>/dev/null || true
          echo "::notice::wheel smoke test passed"

  # --- TestPyPI publish (auto on tag) --------------------------------
  testpypi:
    name: Publish to TestPyPI
    runs-on: ubuntu-latest
    needs: [linux, macos, windows, wheel-test]
    environment:
      name: testpypi
      url: https://test.pypi.org/p/strata-notebook
    permissions:
      id-token: write   # OIDC token for trusted publishing
    steps:
      - uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53  # v6
        with:
          # All dist-* artifacts get merged into a single dist/ dir
          # so the publish action sees every wheel + the sdist.
          path: dist
          pattern: dist-*
          merge-multiple: true

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          # Skip if the version already exists — useful on
          # workflow_dispatch re-runs after a partial failure.
          skip-existing: true

  # --- PyPI publish (gated by manual approval) -----------------------
  # The `pypi` environment in repo Settings → Environments should
  # have a required reviewer. The promotion job sits in `waiting`
  # state until you click "Approve and deploy" in the workflow run UI.
  pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: testpypi
    environment:
      name: pypi
      url: https://pypi.org/p/strata-notebook
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53  # v6
        with:
          path: dist
          pattern: dist-*
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # release/v1

  # --- GitHub Release (release notes from CHANGELOG) -----------------
  # Drafted only after PyPI publish succeeds — a Release that points
  # at a tag whose wheels never made it to PyPI would be misleading.
  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [preflight, pypi]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          # Tag-driven runs default to the tag (github.ref =
          # refs/tags/vX.Y.Z), which is fine. workflow_dispatch
          # otherwise checks out the branch the user dispatched
          # from — if main has moved since the tag, the wheels
          # we'd build wouldn't correspond to the original tag.
          # Redirect dispatch runs to v${inputs.version} so
          # republish recovery actually rebuilds the tagged source.
          ref: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', inputs.version) || github.ref }}


      - name: Extract CHANGELOG section
        id: notes
        env:
          VERSION: ${{ needs.preflight.outputs.version }}
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import os
          import re
          version = os.environ["VERSION"]
          text = open("CHANGELOG.md").read()
          # Match "## <version>[ — date | (anything)]" up to the next
          # "## " heading or EOF. preflight already verified the
          # section exists; the lack of a match here would be a bug.
          pattern = rf"^##\s+{re.escape(version)}(?:[\s—-][^\n]*)?\n(.*?)(?=^##\s|\Z)"
          match = re.search(pattern, text, flags=re.DOTALL | re.MULTILINE)
          body = match.group(1).strip() if match else ""
          print("body<<NOTES_EOF")
          print(body)
          print("NOTES_EOF")
          PY

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65  # v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ${{ steps.notes.outputs.body }}
          prerelease: ${{ needs.preflight.outputs.is_prerelease == 'true' }}
