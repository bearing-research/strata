name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'mkdocs.yml'
      - '*.md'
      - 'LICENSE'
      - '.github/workflows/docs.yml'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'mkdocs.yml'
      - '*.md'
      - 'LICENSE'
      - '.github/workflows/docs.yml'

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  frontend:
    name: Frontend Checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Run frontend tests
        run: npm run test
        working-directory: frontend

      - name: Run frontend build
        run: npm run build
        working-directory: frontend

      - name: Run frontend format check
        run: npm run format:check
        working-directory: frontend

  # Fast unit tests - run on all platforms and Python versions.
  # Windows skips the notebook subsystem (subprocess/venv/fork-style
  # warm pool semantics diverge from POSIX). Core Strata — scanner,
  # planner, cache, fetcher, artifact store, blob store, tenant,
  # auth, QoS — runs on all three platforms.
  unit-tests:
    name: Unit Tests - Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.12", "3.13", "3.14"]

    env:
      RUSTUP_TOOLCHAIN: stable

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      # macOS-latest images ship with Homebrew's rust + rustup pre-
      # installed, configured against /opt/homebrew/etc/.rustup. The
      # setup-rust-toolchain action skips installing rustup when it
      # detects an existing one ("Install rustup, if needed" in the
      # action.yml), and consequently doesn't prepend ~/.cargo/bin to
      # $GITHUB_PATH. The action then runs `rustup toolchain install
      # stable` which lands in ~/.rustup — but cargo on PATH is still
      # Homebrew's, looking at Homebrew's RUSTUP_HOME, which doesn't
      # have the toolchain. The proxy then prints rustup-init's help
      # and exits 1 from inside maturin's cargo-metadata call.
      #
      # Removing Homebrew's rust+rustup before the action forces the
      # action onto its curl-install path, which puts cargo at
      # ~/.cargo/bin, adds it to $GITHUB_PATH, and installs the stable
      # toolchain to ~/.rustup — all consistent.
      - name: Remove Homebrew rust on macOS
        if: runner.os == 'macOS'
        shell: bash
        run: |
          brew list --formula 2>/dev/null | grep -E '^(rust|rustup-init|rustup)$' \
            | xargs -I {} brew uninstall --force --ignore-dependencies {} \
            || true
          rm -rf /opt/homebrew/etc/.rustup
          which rustup 2>/dev/null || echo "rustup removed"

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6  # v1
        with:
          toolchain: stable
          cache-workspaces: rust

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          version: "latest"

      - name: Install dependencies and build Rust extension
        shell: bash
        run: uv sync --python ${{ matrix.python-version }} --all-extras

      - name: Run unit tests (non-Windows)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          uv run pytest tests/ \
            --ignore=tests/test_e2e_artifacts.py \
            --ignore=tests/test_lineage.py \
            --ignore=tests/test_s3_integration.py \
            --ignore=tests/notebook/test_e2e_mounts_s3.py \
            --ignore=tests/notebook/test_e2e_mounts_azure.py \
            --ignore=tests/notebook/test_e2e_mounts_gcs.py \
            -v --tb=short

      - name: Run unit tests (Windows — notebook subsystem skipped)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          uv run pytest tests/ \
            --ignore=tests/test_e2e_artifacts.py \
            --ignore=tests/test_lineage.py \
            --ignore=tests/test_s3_integration.py \
            --ignore=tests/notebook \
            -v --tb=short

  # E2E and integration tests - run on Ubuntu only for speed
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6  # v1
        with:
          toolchain: stable
          cache-workspaces: rust

      - name: Verify Rust toolchain
        # macOS-latest runners intermittently leave the rustup proxy
        # half-configured after setup-rust-toolchain finishes: the
        # install step reports ✓, but cargo invoked from a child
        # shell (eg. maturin under uv sync) resolves to rustup-init
        # and errors out with "unexpected argument 'metadata'".
        # Force-setting the default + dumping versions makes the
        # proxy dispatch correctly AND fails fast with diagnostics
        # if something is genuinely broken, instead of bubbling up
        # as an opaque cargo-metadata failure 30 seconds later.
        shell: bash
        run: |
          rustup default stable
          rustup show active-toolchain
          cargo --version
          rustc --version

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          version: "latest"

      - name: Install dependencies and build Rust extension
        run: uv sync --python 3.12 --all-extras

      - name: Run E2E artifact tests
        run: |
          uv run pytest tests/test_e2e_artifacts.py -v --tb=short

      - name: Run lineage tests
        run: |
          uv run pytest tests/test_lineage.py -v --tb=short

      - name: Run executor protocol tests
        run: |
          uv run pytest tests/test_executor_protocol.py -v --tb=short

  # R-cell integration tests — separate job because R is a distinct
  # runtime from Python, and installing it inside the matrix unit-tests
  # job would multiply the (~30s) install cost across every Py × OS
  # cell without any new signal (R doesn't care about the Python
  # version). Ubuntu + macOS only — the issue #59 ship gate is
  # "Linux + macOS green", and Windows skips notebook tests at the
  # unit-tests level already.
  r-tests:
    name: R Tests (${{ matrix.os }} · R ${{ matrix.r }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      # Current R ("release") on both platforms, plus the previous minor
      # ("oldrel-1") on Ubuntu so an R-version regression surfaces in CI
      # without doubling the whole matrix. posit/RSPM serves binaries for
      # both, so oldrel-1 doesn't trigger a source compile of arrow (#83).
      matrix:
        include:
          - os: ubuntu-latest
            r: release
          - os: macos-latest
            r: release
          - os: ubuntu-latest
            r: oldrel-1

    env:
      RUSTUP_TOOLCHAIN: stable

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      # Same macOS Homebrew rust eviction the unit-tests job needs —
      # see the rationale comment up there. The setup-rust-toolchain
      # action's auto-detect path leaves cargo and rustup pointing at
      # different homes otherwise, and `uv sync` dies inside maturin.
      - name: Remove Homebrew rust on macOS
        if: runner.os == 'macOS'
        shell: bash
        run: |
          brew list --formula 2>/dev/null | grep -E '^(rust|rustup-init|rustup)$' \
            | xargs -I {} brew uninstall --force --ignore-dependencies {} \
            || true
          rm -rf /opt/homebrew/etc/.rustup
          which rustup 2>/dev/null || echo "rustup removed"

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6  # v1
        with:
          toolchain: stable
          cache-workspaces: rust

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          version: "latest"

      - name: Install dependencies and build Rust extension
        run: uv sync --python 3.12 --all-extras

      # ``use-public-rspm: true`` points install.packages() at
      # https://packagemanager.posit.co — pre-compiled Linux binaries
      # turn the ~10-min source compile of ``arrow`` into a ~30s
      # binary download. macOS uses CRAN's native ``.tgz`` binaries.
      - name: Set up R
        uses: r-lib/actions/setup-r@a51a8012b0aab7c32ef9d19bf54da93f3254335e  # v2
        with:
          r-version: ${{ matrix.r }}
          use-public-rspm: true

      # Direct install instead of ``setup-r-dependencies`` — that
      # action expects a DESCRIPTION or renv.lock at the project root,
      # which Strata doesn't ship at the top level (the per-notebook
      # renv.lock lives inside individual notebook dirs). Pin
      # dependencies inline; if Phase 2 adds more R packages, switch
      # to a real lockfile.
      #
      # ``jsonlite`` is the manifest-IO codec the harness uses
      # unconditionally (``harness.R::library(jsonlite)`` at L38);
      # ``arrow`` is lazy-loaded only when a cell actually serializes
      # a data.frame, but the cross-language tests do exactly that, so
      # both are required for the suite to pass. ``renv`` is needed by
      # the real-restore integration test (test_r_cells.py) — having it
      # pre-installed means the fixture's ``renv/activate.R`` finds it
      # instead of bootstrap-downloading a copy mid-test.
      - name: Install R 'jsonlite' + 'arrow' + 'renv' packages
        shell: Rscript {0}
        run: |
          install.packages(c("jsonlite", "arrow", "renv"))
          for (pkg in c("jsonlite", "arrow", "renv")) {
            if (!requireNamespace(pkg, quietly = TRUE)) {
              stop(sprintf("'%s' install reported success but namespace is not loadable", pkg))
            }
          }

      # Targeted suite rather than the full notebook suite — the
      # unit-tests matrix already runs everything else; this job only
      # needs to exercise the R-marked tier that the matrix skips for
      # lack of Rscript.
      - name: Run R-related test files
        shell: bash
        run: |
          uv run pytest \
            tests/notebook/test_r_cells.py \
            tests/notebook/test_language_r_executor.py \
            tests/notebook/test_language_r_analyzer.py \
            -v --tb=short

  notebook-browser-smoke:
    name: Notebook Browser Smoke
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6  # v1
        with:
          toolchain: stable
          cache-workspaces: rust

      - name: Verify Rust toolchain
        # macOS-latest runners intermittently leave the rustup proxy
        # half-configured after setup-rust-toolchain finishes: the
        # install step reports ✓, but cargo invoked from a child
        # shell (eg. maturin under uv sync) resolves to rustup-init
        # and errors out with "unexpected argument 'metadata'".
        # Force-setting the default + dumping versions makes the
        # proxy dispatch correctly AND fails fast with diagnostics
        # if something is genuinely broken, instead of bubbling up
        # as an opaque cargo-metadata failure 30 seconds later.
        shell: bash
        run: |
          rustup default stable
          rustup show active-toolchain
          cargo --version
          rustc --version

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          version: "latest"

      - name: Install backend dependencies and build Rust extension
        run: uv sync --python 3.12 --all-extras

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
        working-directory: frontend

      - name: Start Strata notebook server
        run: |
          STRATA_DEPLOYMENT_MODE=personal STRATA_PORT=8770 STRATA_NOTEBOOK_STORAGE_DIR=/tmp uv run strata-notebook > /tmp/strata-ci.log 2>&1 &
          echo $! > /tmp/strata-ci.pid

      - name: Wait for notebook server health
        run: |
          python - <<'PY'
          import time
          import urllib.request

          url = "http://127.0.0.1:8770/health"
          deadline = time.time() + 60
          last_error = None

          while time.time() < deadline:
              try:
                  with urllib.request.urlopen(url, timeout=2) as response:
                      if response.status == 200:
                          raise SystemExit(0)
              except Exception as exc:  # pragma: no cover - CI shell helper
                  last_error = exc
                  time.sleep(1)

          raise SystemExit(f"Notebook server did not become healthy: {last_error}")
          PY

      - name: Run notebook browser benchmark smoke
        run: npm run benchmark:notebook -- --base-url http://127.0.0.1:8770 --iterations 1
        working-directory: frontend

      - name: Show server logs on failure
        if: failure()
        run: cat /tmp/strata-ci.log

      - name: Stop notebook server
        if: always()
        run: |
          if [ -f /tmp/strata-ci.pid ]; then
            kill "$(cat /tmp/strata-ci.pid)" || true
          fi
