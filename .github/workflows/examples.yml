name: Examples

# Runs the key-free notebook examples end-to-end via `strata run`.
# Catches regressions where a cell-executor / DAG / runtime change
# breaks a real notebook even though the unit tests stay green.
#
# Examples that need API keys or remote workers are intentionally
# excluded:
#   - review_triage          → ANTHROPIC_API_KEY or OPENAI_API_KEY
#   - news_alpha_trader      → ALPACA_API_KEY + LLM key
#   - arxiv_classifier       → custom remote workers (Modal, Fly)
#   - library_cells          → demonstrates a deliberate failure
#                              (the `blocked` cell is the teaching
#                              moment); the headless runner can't
#                              tell that's expected, so this stays
#                              interactive-only

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'rust/**'
      - 'examples/**'
      - 'pyproject.toml'
      - 'Cargo.toml'
      - 'uv.lock'
      - '.github/workflows/examples.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'rust/**'
      - 'examples/**'
      - 'pyproject.toml'
      - 'Cargo.toml'
      - 'uv.lock'
      - '.github/workflows/examples.yml'

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  examples:
    name: example · ${{ matrix.example }}
    runs-on: ubuntu-latest
    strategy:
      # Don't cancel the others on a single failure — a flaky
      # public S3 read shouldn't hide a real failure in a different
      # example.
      fail-fast: false
      matrix:
        example:
          - iris_classification
          - pandas_basics
          - loop_hill_climb
          - markdown_showcase
          - titanic_ml
          - sql_orders_report
          - s3_mount

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6  # v1
        with:
          toolchain: stable
          cache-workspaces: rust

      - name: Verify Rust toolchain
        shell: bash
        run: |
          rustup default stable
          rustup show active-toolchain
          cargo --version
          rustc --version

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          version: 'latest'

      - name: Build Strata (and the Rust extension)
        run: uv sync --python 3.13 --all-extras

      - name: Sync the example's per-notebook venv
        # Each example declares its own ``requires-python`` (==X.Y.*)
        # in its pyproject.toml. ``uv sync`` reads from that and
        # auto-installs the matching interpreter if missing — the
        # workflow shouldn't second-guess the notebook's pinned
        # version, otherwise bumping one example to a different
        # minor would require a coordinated workflow edit too.
        working-directory: examples/${{ matrix.example }}
        run: uv sync

      # ``strata run`` with --no-sync because the env was already
      # synced above. Ignoring cache (--force) so cached artifacts
      # from a previous run don't mask cell-execution regressions.
      - name: Run notebook
        run: uv run strata run examples/${{ matrix.example }} --no-sync --force

  # R-cell examples — a separate job because they need the R toolchain
  # (Rscript + packages) on top of the Python build. Headless ``strata
  # run`` executes R cells (#98) and restores each notebook's renv.lock
  # into a project-scoped library on the way in, so no manual
  # renv::restore step is needed — only the harness baseline (jsonlite +
  # arrow) and renv itself are pre-installed; everything else (e.g.
  # ggplot2 for r_mtcars_analysis) comes from the notebook's renv.lock.
  r-examples:
    name: example · ${{ matrix.example }} (R)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        example:
          - r_mtcars_analysis
          - r_lm_vs_sklearn

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6  # v1
        with:
          toolchain: stable
          cache-workspaces: rust

      - name: Verify Rust toolchain
        shell: bash
        run: |
          rustup default stable
          rustup show active-toolchain
          cargo --version
          rustc --version

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          version: 'latest'

      # use-public-rspm pulls binary packages on Ubuntu, turning a
      # ~10-min source compile of arrow into a ~30s download.
      - name: Set up R
        uses: r-lib/actions/setup-r@a51a8012b0aab7c32ef9d19bf54da93f3254335e  # v2
        with:
          r-version: "release"
          use-public-rspm: true

      # Harness baseline (jsonlite + arrow) plus renv, which the
      # notebook's auto-restore uses to install the rest from renv.lock.
      - name: Install R 'jsonlite' + 'arrow' + 'renv' packages
        shell: Rscript {0}
        run: |
          install.packages(c("jsonlite", "arrow", "renv"))
          for (pkg in c("jsonlite", "arrow", "renv")) {
            if (!requireNamespace(pkg, quietly = TRUE)) {
              stop(sprintf("'%s' install reported success but namespace is not loadable", pkg))
            }
          }

      - name: Build Strata (and the Rust extension)
        run: uv sync --python 3.13 --all-extras

      - name: Sync the example's per-notebook venv
        working-directory: examples/${{ matrix.example }}
        run: uv sync

      # --no-sync because the Python venv is already synced above;
      # ``strata run`` still restores the notebook's renv.lock into its
      # project library before executing the R cells.
      - name: Run notebook
        run: uv run strata run examples/${{ matrix.example }} --no-sync --force
