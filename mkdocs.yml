site_name: Strata
site_url: https://bearing-research.github.io/strata/
site_description: A content-addressed computation graph with an interactive notebook UI
repo_url: https://github.com/bearing-research/strata
repo_name: bearing-research/strata

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.tabs
    - navigation.top
    - content.code.copy
    - search.highlight
    - search.suggest
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
  - attr_list
  - def_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  # Renders `++shift+enter++` as styled keyboard keys.
  # Used in the notebook quickstart and keyboard-shortcuts pages.
  - pymdownx.keys

plugins:
  - search

hooks:
  - docs_hooks/export_examples.py

nav:
  - Home: index.md
  - Changelog: changelog.md
  - Notebook:
    - Quickstart: getting-started/notebook.md
    - Concepts: notebook/concepts.md
    - vs Jupyter, Marimo, Pluto: notebook/comparison.md
    - Examples: notebook/examples.md
    - Cell Types: notebook/cells.md
    - Cell Annotations: notebook/annotations.md
    - Distributed Workers: notebook/workers.md
    - AI Integration: notebook/ai.md
    - Environment: notebook/environment.md
    - Secret Manager: notebook/secrets.md
    - Headless Runner: notebook/cli.md
    - Import from Jupyter: notebook/import.md
    - Export: notebook/export.md
    - Keyboard Shortcuts: notebook/keyboard.md
  - Core:
    - Quickstart: getting-started/core.md
  - API Reference:
    - Notebook Client Protocol: reference/notebook-protocol.md
    - REST API: reference/rest-api.md
    - WebSocket Protocol: reference/websocket.md
    - Executor Protocol: reference/executor-protocol.md
    - notebook.toml Schema: reference/notebook-toml.md
  - Deployment:
    - Installation: getting-started/installation.md
    - Configuration: reference/configuration.md
    - Deployment Modes: deployment/modes.md
    - Service Mode: deployment/service-mode.md
    - Operations & Lifecycle: deployment/lifecycle.md
    - Privacy & Sharing: deployment/privacy.md
    - Docker: deployment/docker.md
    - Fly.io: deployment/fly.md
    - GitHub Codespaces: deployment/codespaces.md
    - Observability: deployment/observability.md

exclude_docs: |
  internal/

# Versioned docs via `mike`. Material's `extra.version` block renders
# the version-picker dropdown in the header; `mike` populates the
# ``versions.json`` mike maintains under the ``gh-pages`` root.
#
# Aliases used:
#   * ``latest`` — points to the most recent release tag. Default
#     entrypoint, so a bare visit to the site lands here.
#   * ``dev``   — tracks ``main``. Updated by the docs.yml workflow on
#     every push to main; deployable read-only preview of the
#     next-release content.
#   * ``<version>`` — pinned snapshot per release tag (``0.1``, ``0.2``,
#     ...). Pushed by the release-driven workflow.
extra:
  version:
    provider: mike
    default: latest
