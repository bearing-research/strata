# Grafana data sources provisioning
apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    # Pinned so the dashboard's datasource reference (uid "prometheus")
    # resolves deterministically instead of relying on default-datasource
    # fallback.
    uid: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false

  - name: Jaeger
    type: jaeger
    access: proxy
    url: http://jaeger:16686
    editable: false
