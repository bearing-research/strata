# Extended Jupyter corpus.
#
# Hand-curated set of .ipynb files we want to keep working across
# converter changes. Fetched at test time (cached locally), run
# through the full parse → convert → dag → run → artifact pipeline.
# Drives the nightly jupyter-corpus GitHub Actions workflow.
#
# Each entry pins to a specific commit SHA or release tag in the URL —
# never to `main` / `master` — so the corpus is reproducible across
# runs. Refreshing is a deliberate act, not a moving target.
#
# Adding a new entry:
#   1. Pick a notebook from a stable public repo.
#   2. Resolve a permanent URL pinned to a commit SHA (or a tag like
#      v2.2.0). Use raw.githubusercontent.com.
#   3. Run `STRATA_CORPUS_RUN=1 pytest -k <name>` locally to confirm
#      the entry clears the steps you expect.
#   4. ``expected: pass``        — must run end-to-end through the
#                                  five-step rubric.
#      ``expected: parse_only``  — only parse + convert + dag get
#                                  scored; run + artifact skipped.
#                                  Use this when the notebook itself
#                                  has aged out against current
#                                  library versions (API drift in
#                                  numpy / pandas / matplotlib etc.),
#                                  needs a GPU / paid API, downloads
#                                  multi-GB data, etc.

notebooks:
  # ---- Python Data Science Handbook (Jake VanderPlas) ----
  # Stable repo, pinned to a verified commit SHA. Auto-import-capture
  # successfully infers the deps (numpy / pandas / matplotlib), but
  # the notebook code itself predates modern library versions and
  # exercises behaviors that have since been removed or changed.
  # Kept at parse_only to track the converter / DAG side without
  # asserting ecosystem stability we don't control.

  - name: pdsh-numpy-array-basics
    url: https://raw.githubusercontent.com/jakevdp/PythonDataScienceHandbook/d66231454ef753818dc9213c9b5942e067266966/notebooks/02.02-The-Basics-Of-NumPy-Arrays.ipynb
    expected: parse_only
    reason: "upstream API drift: relies on numpy view mutability that's now read-only by default"

  - name: pdsh-pandas-objects
    url: https://raw.githubusercontent.com/jakevdp/PythonDataScienceHandbook/d66231454ef753818dc9213c9b5942e067266966/notebooks/03.01-Introducing-Pandas-Objects.ipynb
    expected: parse_only
    reason: "upstream API drift: pandas.Index became immutable; old assignment patterns now raise"

  - name: pdsh-matplotlib-line-plots
    url: https://raw.githubusercontent.com/jakevdp/PythonDataScienceHandbook/d66231454ef753818dc9213c9b5942e067266966/notebooks/04.01-Simple-Line-Plots.ipynb
    expected: parse_only
    reason: "upstream API drift: 'seaborn-whitegrid' matplotlib style was renamed"
